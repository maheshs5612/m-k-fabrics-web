backend:
  name: github
  repo: maheshs5612/m-k-fabrics-web
  branch: main
  base_url: https://m-k-fabrics.vercel.app
  auth_endpoint: api/auth

publish_mode: editorial_workflow

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "gallery"
    label: "Gallery"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}-{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}"
    format: "json"
    extension: "json"
    label_singular: "Gallery Item"
    summary: "{{title}} — {{fields.category}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Rayon", value: "Rayon" }
          - { label: "Cambric", value: "Cambric" }
          - { label: "Poplin", value: "Poplin" }
          - { label: "Modal", value: "Modal" }
          - { label: "Yarn Dyed", value: "Yarn Dyed" }
          - { label: "Cotton", value: "Cotton" }
          - { label: "Cotton Voile", value: "Cotton Voile" }
          - { label: "Suiting", value: "Suiting" }
          - { label: "Shirting", value: "Shirting" }
          - { label: "Embroidery", value: "Embroidery" }
          - { label: "Other", value: "Other" }
        default: "Other"
      - { label: "Note", name: "note", widget: "text", required: false }
      - label: "Images"
        name: "images"
        widget: "list"
        label_singular: "Image"
        min: 1
        field:
          label: "Image"
          name: "image"
          widget: "image"

  - name: "site_settings"
    label: "Site Settings"
    files:
      - label: "Contact Details"
        name: "contact"
        file: "content/contact.json"
        format: "json"
        fields:
          - { label: "Phone", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Address", name: "address", widget: "text" }
          - { label: "WhatsApp Link", name: "whatsapp", widget: "string" }
